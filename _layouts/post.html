---
layout: default
---
{% assign lang = page.lang | default: site.default_lang %}
{% assign t = site.data.i18n[lang] %}
<article class="post">
  <p class="post-meta">{{ page.date | date: "%-d/%m/%Y" }}{% if page.author %} · {{ page.author }}{% endif %}</p>
  <h1>{{ page.title }}</h1>
  {% if page.image %}<img class="post-hero" src="{{ page.image | relative_url }}" alt="{{ page.title }}">{% endif %}
  <div class="post-body">
    {{ content }}
  </div>
  <p class="back"><a href="{{ t.url_news | relative_url }}">{{ t.back_news }}</a></p>
</article>
